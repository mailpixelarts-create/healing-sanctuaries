<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4A265"/>
      <stop offset="20%" stop-color="#D2B48C"/>
      <stop offset="40%" stop-color="#C19A6B"/>
      <stop offset="60%" stop-color="#B8860B"/>
      <stop offset="80%" stop-color="#A0784C"/>
      <stop offset="100%" stop-color="#C4A265"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#sandGrad)" />
  <rect width="1200" height="600" fill="url(#sandGrad)" filter="url(#noise)" opacity="0.6"/>
  <g opacity="0.08">
