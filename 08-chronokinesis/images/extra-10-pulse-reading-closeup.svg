<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#2C1810"/>
    </radialGradient>
    <linearGradient id="skinTone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C4956A"/>
      <stop offset="50%" stop-color="#B8845A"/>
      <stop offset="100%" stop-color="#A0704A"/>
    </linearGradient>
    <linearGradient id="fingerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A574"/>
      <stop offset="100%" stop-color="#B8845A"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bgBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Background - warm wood tones, out of focus -->
  <rect width="1200" height="675" fill="#3D2015"/>
  <g filter="url(#bgBlur)" opacity="0.4">
    <rect x="100" y="0" width="200" height="675" fill="#5C3A28" rx="50"/>
    <rect x="800" y="0" width="150" height="675" fill="#4A2E1E" rx="30"/>
    <rect x="400" y="0" width="300" height="675" fill="#3D2015" rx="80"/>
  </g>

  <!-- Forearm -->
  <path d="M 200 380 Q 400 300, 600 310 Q 800 320, 1000 350 L 1000 550 Q 800 570, 600 560 Q 400 550, 200 500 Z" fill="url(#skinTone)" opacity="0.9"/>

  <!-- Wrist area highlight -->
  <ellipse cx="550" cy="390" rx="120" ry="60" fill="#D4A574" opacity="0.3"/>

  <!-- Vein/pulse line on wrist -->
  <path d="M 500 380 Q 540 370, 580 385" fill="none" stroke="#8B6F5A" stroke-width="0.8" opacity="0.4"/>

  <!-- Index finger (approaching pulse point) -->
  <path d="M 620 300 Q 580 340, 560 370 Q 550 385, 555 395 Q 565 400, 580 390 Q 600 370, 640 330 Z" fill="url(#fingerGrad)" opacity="0.95"/>
  <!-- Finger nail -->
  <path d="M 555 370 Q 550 378, 553 385" fill="none" stroke="#D4B896" stroke-width="0.5" opacity="0.6"/>

  <!-- Middle finger -->
  <path d="M 640 310 Q 600 350, 575 385 Q 565 400, 570 408 Q 580 412, 595 400 Q 615 375, 660 340 Z" fill="url(#fingerGrad)" opacity="0.95"/>

  <!-- Warm light source effect from left -->
  <rect x="0" y="0" width="400" height="675" fill="#FFD700" opacity="0.04"/>
  <ellipse cx="100" cy="300" rx="200" ry="300" fill="#FFD700" opacity="0.03"/>

  <!-- Subtle vignette -->
  <rect width="1200" height="675" fill="url(#glow)" opacity="0.3"/>

  <!-- Label text -->
  <text x="600" y="620" font-family="serif" font-size="18" font-style="italic" fill="#C4A265" text-anchor="middle" opacity="0.6">Nadi Pariksha — Pulse Diagnosis</text>
</svg>
